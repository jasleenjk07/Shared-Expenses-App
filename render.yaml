databases:
  - name: shared-expenses-db
    plan: free
    databaseName: shared_expenses
    user: shared_expenses

services:
  - type: web
    name: shared-expenses-app
    runtime: python
    plan: free
    buildCommand: >-
      pip install -r backend/requirements.txt &&
      pip install psycopg2-binary==2.9.9 &&
      cd frontend && npm install && npm run build
    startCommand: PYTHONPATH=. gunicorn backend.app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: USD_TO_INR_RATE
        value: "83.0"
      - key: DATABASE_URL
        fromDatabase:
          name: shared-expenses-db
          property: connectionString
